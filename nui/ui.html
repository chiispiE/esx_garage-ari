<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>ari_garage</title>
  <link rel="stylesheet" href="css/app.css"/>
</head>
<body>

<div id="overlay" class="hidden">
  <div id="panel" role="dialog" aria-modal="true">

    <!-- ── Sidebar ── -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="1" y="3" width="15" height="13" rx="2"/>
            <path d="M16 8h4l3 5v3h-7V8Z"/>
            <circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>
          </svg>
        </div>
        <div class="sidebar-titles">
          <span class="sidebar-resource">ari_garage</span>
          <span id="garage-label" class="sidebar-subtitle">Loading…</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-btn active" data-tab="garage">
          <svg class="nav-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          <span>Garage</span>
          <span class="nav-badge" id="badge-garage">0</span>
        </button>
        <button class="nav-btn" data-tab="impounded" id="tab-impounded">
          <svg class="nav-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span>Impounded</span>
          <span class="nav-badge warn" id="badge-impounded">0</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <span class="version-tag">v1.15.0-ari</span>
      </div>
    </aside>

    <!-- ── Main Content ── -->
    <main id="content">

      <!-- Header bar -->
      <div class="content-topbar">
        <h1 id="content-title">Garage</h1>
        <div class="topbar-actions">
          <div class="search-wrap">
            <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input id="search-input" type="search" placeholder="Search model or plate…" autocomplete="off" spellcheck="false"/>
          </div>
          <button id="btn-close" class="close-btn" title="Close (Esc)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Vehicle grid -->
      <div id="vehicle-grid" class="vehicle-grid"></div>

      <!-- Empty state -->
      <div id="empty-state" class="empty-state hidden">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.35">
          <rect x="1" y="3" width="15" height="13" rx="2"/>
          <path d="M16 8h4l3 5v3h-7V8Z"/>
          <circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>
        </svg>
        <p id="empty-msg">No vehicles stored here.</p>
      </div>

    </main>

  </div><!-- /panel -->
</div><!-- /overlay -->

<script src="nui://game/ui/jquery.js"></script>
<script src="js/app.js"></script>
</body>
</html>
